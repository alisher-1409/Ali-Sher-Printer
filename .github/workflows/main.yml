name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build with Buildozer
        # Hum direct Docker image istemal karenge jo Kivy walo ki apni hai
        uses: docker://kivy/buildozer:latest
        with:
          args: android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Ali-Sher-Printer-APK
          path: bin/*.apk
